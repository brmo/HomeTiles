<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab5 Game Controls</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #ffffff;
      padding: 16px;
      overflow: hidden;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 8px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .app-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .tabbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }

    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tab-button {
      background: #242424;
      color: #cbd5e1;
      border: 1px solid #333;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab-button.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #ffffff;
    }

    .tab-content {
      display: none;
      height: 100%;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content.system-tab.active {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 16px;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .status.connected {
      background: #10b981;
      color: white;
    }

    .status.disconnected {
      background: #ef4444;
      color: white;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
    }

    .status-pill.connected {
      background: #10b981;
      color: white;
    }

    .status-pill.disconnected {
      background: #ef4444;
      color: white;
    }

    .config {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .config-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .config-row label {
      min-width: 80px;
      font-weight: 600;
      font-size: 11px;
    }

    .config-row input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1a1a1a;
      color: white;
      font-size: 12px;
    }

    .config-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .config-row.key-output-row {
      flex-wrap: wrap;
    }

    .last-button-inline {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .last-button-inline .last-button-label {
      font-size: 11px;
      color: #a0a0a0;
      white-space: nowrap;
    }

    .last-button.compact {
      padding: 6px 10px;
      border-left: 3px solid #3b82f6;
    }

    .last-button.compact .slot {
      font-size: 14px;
      margin-bottom: 2px;
    }

    .last-button.compact .name {
      font-size: 12px;
      margin-bottom: 2px;
    }

    .last-button.compact .key-info {
      font-size: 11px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .button-activity h3,
    .log-header h3,
    .metrics-header h3 {
      font-size: 13px;
    }

    .config .status-pill {
      font-size: 10px;
      padding: 2px 8px;
    }

    .config .btn-compact {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .metrics {
      background: #2a2a2a;
      padding: 16px 10px 16px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .metrics-header h3 {
      font-size: 13px;
      margin-bottom: 6px;
    }

    .metrics-header .simvar-title {
      font-size: 13px;
    }

    .metrics-note {
      font-size: 12px;
      color: #a0a0a0;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      margin-top: 12px;
    }

    .metrics-grid.single-column {
      grid-template-columns: 1fr;
    }

    .metrics-list {
      margin-top: 8px;
      max-height: 320px;
      overflow-y: auto;
      overflow-x: hidden;
      margin-right: -10px;
      padding-right: 10px;
    }

    .metrics-live {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #3a3a3a;
    }

    .metrics-values {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      font-size: 13px;
      color: #d1d5db;
    }

    .metrics-value-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .metrics-value-label {
      color: #9ca3af;
    }

    .metrics-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #e5e7eb;
      justify-content: space-between;
    }

    .metrics-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .metrics-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .metrics-inline-value {
      margin-left: auto;
      color: #9ca3af;
      font-size: 12px;
      white-space: nowrap;
    }

    .simvar-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr) minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      font-size: 12px;
    }

    .simvar-value {
      color: #9ca3af;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 6px 8px;
    }

    .simvar-header {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 6px;
      margin-bottom: 6px;
      margin-right: -10px;
      padding-right: 10px;
    }

    .simvar-header span {
      padding-left: 8px;
    }

    .simvar-input,
    .simvar-select {
      background: #1a1a1a;
      color: #e5e7eb;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      width: 100%;
    }

    .simvar-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .simvar-actions button {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
    }

    .simvar-list {
      overflow-y: auto;
      overflow-x: hidden;
      margin-right: -10px;
      padding-right: 10px;
    }

    .tab-content[data-tab="flight"].active {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .tab-content[data-tab="flight"] .metrics {
      margin-bottom: 0;
    }

    .metrics.scroll-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .metrics.scroll-panel .metrics-list,
    .metrics.scroll-panel .simvar-list {
      flex: 1;
      min-height: 0;
      background: transparent;
    }

    .metrics.scroll-panel .metrics-list::-webkit-scrollbar-track,
    .metrics.scroll-panel .simvar-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .metrics.scroll-panel .metrics-list::-webkit-scrollbar-corner,
    .metrics.scroll-panel .simvar-list::-webkit-scrollbar-corner {
      background: transparent;
    }

    .metrics.scroll-panel .metrics-list::-webkit-scrollbar-thumb,
    .metrics.scroll-panel .simvar-list::-webkit-scrollbar-thumb {
      background: #3b3b3b;
    }

    .metrics.scroll-panel .metrics-list::-webkit-scrollbar,
    .metrics.scroll-panel .simvar-list::-webkit-scrollbar {
      width: 6px;
    }

    .simvar-remove {
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
    }

    .simvar-edit {
      background: transparent;
      color: #38bdf8;
      border: 1px solid #38bdf8;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .simvar-edit svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      width: min(420px, 92%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 700;
    }

    .modal-summary {
      font-size: 11px;
      color: #9ca3af;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .modal-close {
      background: transparent;
      color: #cbd5e1;
      border: 1px solid #3a3a3a;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .modal-field label {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 600;
    }

    .modal-field input,
    .modal-field select {
      background: #141414;
      color: #e5e7eb;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .modal-readonly {
      background: #111111;
      color: #e5e7eb;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .modal-note {
      font-size: 11px;
      color: #6b7280;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.primary {
      background: #3b82f6;
      color: white;
    }

    button.primary:hover {
      background: #2563eb;
    }

    button.secondary {
      background: #6b7280;
      color: white;
    }

    button.secondary:hover {
      background: #4b5563;
    }

    .log-container {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .log-header h3 {
      font-size: 13px;
    }

    .log-clear {
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      padding: 5px 12px;
      font-size: 12px;
    }

    .log-entry {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px;
      border-bottom: 1px solid #1a1a1a;
      color: #a0a0a0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .log-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
    }

    .system-tab .config,
    .system-tab .button-activity {
      margin-bottom: 0;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #6b7280;
      margin-right: 10px;
    }

    .button-activity {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .button-activity h3 {
      font-size: 13px;
      margin-bottom: 15px;
    }

    .last-button {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
    }

    .last-button .slot {
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 5px;
    }

    .last-button .name {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .last-button .key-info {
      font-size: 14px;
      color: #6b7280;
      font-family: 'Courier New', monospace;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    ::-webkit-scrollbar-corner {
      background: #1a1a1a;
    }

    @media (max-width: 520px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="app-title">Tab5 Game Controls</div>
      <div class="status disconnected" id="status">Disconnected</div>
    </div>

    <div class="tabbar">
      <button class="tab-button active" data-tab="system">System</button>
      <button class="tab-button" data-tab="flight">Flight Sim</button>
      <button class="tab-button" data-tab="pc">PC Metrics</button>
    </div>

    <div class="content">
      <div class="tab-content system-tab active" data-tab="system">
        <div class="config">
          <div class="config-row">
            <label>Tab5 IP:</label>
            <input type="text" id="tab5-ip" placeholder="192.168.2.235">
            <div class="inline-actions">
              <button class="primary btn-compact" id="tab5-toggle-btn" onclick="toggleTab5Connection()">Connect</button>
            </div>
          </div>
          <div class="config-row">
            <label>Autostart:</label>
            <input type="checkbox" id="autostart-checkbox" checked onchange="toggleAutostart()">
            <span style="font-size: 12px; color: #a0a0a0; margin-left: 10px;">Start with Windows</span>
          </div>
          <div class="config-row key-output-row">
            <label>Key Output:</label>
            <input type="checkbox" id="key-output-enable">
            <span id="key-output-status" class="status-pill disconnected">Disabled</span>
            <div class="last-button-inline">
              <span class="last-button-label">Last Button</span>
              <div class="last-button compact" id="last-button">
                <div style="color: #6b7280;">No button pressed yet</div>
              </div>
            </div>
          </div>
          <div class="config-row">
            <label>Flight Sim:</label>
            <input type="checkbox" id="sim-enable">
            <span id="sim-status" class="status-pill disconnected">Disconnected</span>
          </div>
          <div class="config-row">
            <label>PC Metrics:</label>
            <input type="checkbox" id="pc-metrics-enable">
          </div>
        </div>

        <div class="log-container">
          <div class="log-header">
            <h3>Activity Log</h3>
            <button class="log-clear" onclick="clearLog()">Clear</button>
          </div>
          <div class="log-body">
            <div id="log"></div>
          </div>
        </div>
      </div>

      <div class="tab-content" data-tab="flight">
        <div class="metrics scroll-panel">
          <div class="metrics-header">
            <h3 class="simvar-title">SimVars</h3>
          </div>
          <div class="simvar-grid simvar-header">
            <span>Entity Id</span>
            <span>SimVar</span>
            <span>Value</span>
            <span></span>
            <span></span>
          </div>
          <div class="simvar-list" id="simvar-editor-list"></div>
          <div class="simvar-actions">
            <button class="primary" type="button" onclick="addSimVarRow()">Add SimVar</button>
            <button class="secondary" type="button" onclick="saveSimVarList()">Save SimVars</button>
          </div>
        </div>
      </div>

      <div class="tab-content" data-tab="pc">
        <div class="metrics">
          <div class="metrics-header">
            <h3>PC Metrics</h3>
            <div class="metrics-note">Select what the app sends to Tab5. Temps need supported sensors.</div>
          </div>
          <div class="metrics-list">
            <div class="metrics-grid single-column">
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-cpu-load"><span>CPU Load</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.cpu_load">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-cpu-temp"><span>CPU Temp</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.cpu_temp">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-gpu-load"><span>GPU Load</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.gpu_load">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-gpu-temp"><span>GPU Temp</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.gpu_temp">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-mem-used"><span>RAM Used (GB)</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.mem_used">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-mem-pct"><span>RAM Usage (%)</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.mem_pct">--</span>
              </label>
              <label class="metrics-item">
                <span class="metrics-label"><input type="checkbox" id="metric-uptime"><span>Uptime</span></span>
                <span class="metrics-inline-value" data-scope="pc" data-entity="pc.uptime">--</span>
              </label>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal" id="simvar-modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="simvar-modal-title">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="simvar-modal-title">Edit SimVar</div>
          <div class="modal-summary" id="simvar-modal-summary"></div>
        </div>
        <button class="modal-close" type="button" id="simvar-modal-close">Close</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label for="simvar-modal-entity">Entity Id</label>
          <input type="text" id="simvar-modal-entity" placeholder="sim.ias">
        </div>
        <div class="modal-field">
          <label for="simvar-modal-simvar">SimVar</label>
          <input type="text" id="simvar-modal-simvar" placeholder="AIRSPEED INDICATED">
        </div>
        <div class="modal-field">
          <label for="simvar-modal-unit">Unit</label>
          <input type="text" id="simvar-modal-unit" placeholder="e.g. knots">
        </div>
        <div class="modal-field">
          <label for="simvar-modal-type">Type</label>
          <select id="simvar-modal-type">
            <option value="float64">float64</option>
            <option value="int32">int32</option>
            <option value="string32">string32</option>
            <option value="string256">string256</option>
          </select>
        </div>
        <div class="modal-field">
          <label for="simvar-modal-decimals">Decimals</label>
          <input type="number" id="simvar-modal-decimals" min="0" max="6" step="1" placeholder="auto (2)">
          <div class="modal-note">Leave empty to use default rounding.</div>
        </div>
        <div class="modal-field">
          <label>Current Value</label>
          <div class="modal-readonly" id="simvar-modal-current">--</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="secondary" type="button" id="simvar-modal-cancel">Cancel</button>
        <button class="primary" type="button" id="simvar-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const metricsDefaults = {
      cpu_load: true,
      cpu_temp: false,
      gpu_load: false,
      gpu_temp: false,
      mem_used: true,
      mem_pct: true,
      uptime: true
    };
    const simDefaults = {
      enabled: false,
      host: '127.0.0.1',
      port: 13375
    };
    let simVarList = [];
    const lastSimMetrics = new Map();
    let simVarAutosaveTimer = null;
    let tab5IpSaveTimer = null;

    function setMetricCheckbox(id, value) {
      const el = document.getElementById(id);
      if (el) el.checked = !!value;
    }

    function getMetricCheckbox(id) {
      const el = document.getElementById(id);
      return !!(el && el.checked);
    }

    function loadMetricsConfig() {
      const cfg = ipcRenderer.sendSync('get-metrics-config') || {};
      const merged = { ...metricsDefaults, ...cfg };
      setMetricCheckbox('metric-cpu-load', merged.cpu_load);
      setMetricCheckbox('metric-cpu-temp', merged.cpu_temp);
      setMetricCheckbox('metric-gpu-load', merged.gpu_load);
      setMetricCheckbox('metric-gpu-temp', merged.gpu_temp);
      setMetricCheckbox('metric-mem-used', merged.mem_used);
      setMetricCheckbox('metric-mem-pct', merged.mem_pct);
      setMetricCheckbox('metric-uptime', merged.uptime);
    }

    function collectMetricsConfig() {
      return {
        cpu_load: getMetricCheckbox('metric-cpu-load'),
        cpu_temp: getMetricCheckbox('metric-cpu-temp'),
        gpu_load: getMetricCheckbox('metric-gpu-load'),
        gpu_temp: getMetricCheckbox('metric-gpu-temp'),
        mem_used: getMetricCheckbox('metric-mem-used'),
        mem_pct: getMetricCheckbox('metric-mem-pct'),
        uptime: getMetricCheckbox('metric-uptime')
      };
    }

    function saveMetricsConfig() {
      ipcRenderer.send('set-metrics-config', collectMetricsConfig());
    }

    function bindMetricsInputs() {
      const ids = [
        'metric-cpu-load',
        'metric-cpu-temp',
        'metric-gpu-load',
        'metric-gpu-temp',
        'metric-mem-used',
        'metric-mem-pct',
        'metric-uptime'
      ];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', saveMetricsConfig);
      });
    }

    function loadSimConfig() {
      const cfg = ipcRenderer.sendSync('get-sim-config') || {};
      const merged = { ...simDefaults, ...cfg };
      const enabled = document.getElementById('sim-enable');
      if (enabled) enabled.checked = !!merged.enabled;
    }

    function collectSimConfig() {
      const enabled = document.getElementById('sim-enable');
      const current = ipcRenderer.sendSync('get-sim-config') || {};
      return {
        enabled: !!(enabled && enabled.checked),
        host: current.host || simDefaults.host,
        port: current.port || simDefaults.port
      };
    }

    function saveSimConfig() {
      ipcRenderer.send('set-sim-config', collectSimConfig());
    }

    function bindSimInputs() {
      const ids = ['sim-enable'];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', saveSimConfig);
      });
    }

    function saveTab5IpNow() {
      const el = document.getElementById('tab5-ip');
      if (!el) return;
      const ip = el.value.trim();
      ipcRenderer.send('set-tab5-ip', ip);
    }

    function scheduleTab5IpSave() {
      if (tab5IpSaveTimer) clearTimeout(tab5IpSaveTimer);
      tab5IpSaveTimer = setTimeout(saveTab5IpNow, 400);
    }

    function bindTab5IpInput() {
      const el = document.getElementById('tab5-ip');
      if (!el) return;
      el.addEventListener('input', scheduleTab5IpSave);
      el.addEventListener('blur', saveTab5IpNow);
    }

    function loadPcMetricsEnabled() {
      const enabled = ipcRenderer.sendSync('get-pc-metrics-enabled');
      const el = document.getElementById('pc-metrics-enable');
      if (el) el.checked = !!enabled;
    }

    function savePcMetricsEnabled() {
      const el = document.getElementById('pc-metrics-enable');
      if (!el) return;
      ipcRenderer.send('set-pc-metrics-enabled', !!el.checked);
    }

    function bindPcMetricsToggle() {
      const el = document.getElementById('pc-metrics-enable');
      if (el) el.addEventListener('change', savePcMetricsEnabled);
    }

    function loadKeyOutputEnabled() {
      const enabled = ipcRenderer.sendSync('get-key-output-enabled');
      const el = document.getElementById('key-output-enable');
      if (el) el.checked = !!enabled;
      updateKeyOutputStatus(enabled);
    }

    function saveKeyOutputEnabled() {
      const el = document.getElementById('key-output-enable');
      if (!el) return;
      const enabled = !!el.checked;
      ipcRenderer.send('set-key-output-enabled', enabled);
      updateKeyOutputStatus(enabled);
    }

    function bindKeyOutputToggle() {
      const el = document.getElementById('key-output-enable');
      if (el) el.addEventListener('change', saveKeyOutputEnabled);
    }

    function updateKeyOutputStatus(enabled) {
      const statusEl = document.getElementById('key-output-status');
      if (!statusEl) return;
      statusEl.className = `status-pill ${enabled ? 'connected' : 'disconnected'}`;
      statusEl.textContent = enabled ? 'Enabled' : 'Disabled';
    }

    function filterValidSimVarList(list) {
      if (!Array.isArray(list)) return [];
      const seen = new Set();
      return list.filter((entry) => {
        if (!entry) return false;
        const entityId = String(entry.entity_id || '').trim();
        const simvar = String(entry.simvar || '').trim();
        if (!entityId || !simvar) return false;
        const key = entityId.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function renderSimVarEditorList() {
      const container = document.getElementById('simvar-editor-list');
      if (!container) return;
      container.innerHTML = '';

      simVarList.forEach((entry, index) => {
        const row = document.createElement('div');
        row.className = 'simvar-grid';
        row.dataset.index = String(index);

        row.appendChild(buildSimVarInput('entity_id', entry.entity_id, 'sim.ias'));
        row.appendChild(buildSimVarInput('simvar', entry.simvar, 'AIRSPEED INDICATED'));

        const valueSpan = document.createElement('span');
        valueSpan.className = 'simvar-value';
        valueSpan.dataset.scope = 'sim';
        valueSpan.dataset.entity = entry.entity_id;
        valueSpan.textContent = '--';
        row.appendChild(valueSpan);

        const edit = document.createElement('button');
        edit.type = 'button';
        edit.className = 'simvar-edit';
        edit.setAttribute('aria-label', 'Edit SimVar');
        edit.title = 'Edit SimVar';
        edit.innerHTML = `
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M14.7 2.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4L7 15.9 3 17l1.1-4L14.7 2.3zM4.5 13.8l1.7 1.7 9-9-1.7-1.7-9 9z"/>
          </svg>
        `;
        edit.addEventListener('click', () => openSimVarModal(index));
        row.appendChild(edit);

        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'simvar-remove';
        remove.textContent = 'X';
        remove.addEventListener('click', () => removeSimVarRow(index));
        row.appendChild(remove);

        container.appendChild(row);
      });
    }

    function buildSimVarInput(field, value, placeholder) {
      const input = document.createElement('input');
      input.className = 'simvar-input';
      input.dataset.field = field;
      input.placeholder = placeholder;
      input.value = value || '';
      return input;
    }

    function normalizeTypeValue(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw === 'int' || raw === 'int32' || raw === 'bool') return 'int32';
      if (raw === 'string' || raw === 'string32') return 'string32';
      if (raw === 'string256') return 'string256';
      return 'float64';
    }

    let simVarModalIndex = null;

    function parseDecimalInput(value) {
      if (value === null || value === undefined || value === '') return null;
      const raw = String(value).trim();
      if (!raw) return null;
      const parsed = Number(raw);
      if (!Number.isFinite(parsed)) return null;
      const rounded = Math.floor(parsed);
      if (rounded < 0) return null;
      return Math.min(6, rounded);
    }

    function updateSimVarModalSummary(entityId, simvarName) {
      const summary = document.getElementById('simvar-modal-summary');
      if (!summary) return;
      summary.innerHTML = '';
      const entity = document.createElement('span');
      const simvar = document.createElement('span');
      entity.textContent = `Entity: ${entityId || '-'}`;
      simvar.textContent = `SimVar: ${simvarName || '-'}`;
      summary.appendChild(entity);
      summary.appendChild(simvar);
    }

    function updateSimVarModalCurrentValue() {
      const currentEl = document.getElementById('simvar-modal-current');
      const entityInput = document.getElementById('simvar-modal-entity');
      if (!currentEl || !entityInput) return;
      const entityId = entityInput.value.trim();
      if (!entityId) {
        currentEl.textContent = '--';
        return;
      }
      const metric = lastSimMetrics.get(entityId);
      if (!metric) {
        currentEl.textContent = '--';
        return;
      }
      const decimalsInput = document.getElementById('simvar-modal-decimals');
      let decimals = null;
      if (decimalsInput && decimalsInput.value !== '') {
        decimals = parseDecimalInput(decimalsInput.value);
      } else {
        decimals = getSimVarDecimals(entityId);
      }
      currentEl.textContent = formatMetricDisplay(metric.value, metric.unit, decimals);
    }

    function openSimVarModal(index) {
      syncSimVarListFromEditor();
      const entry = simVarList[index];
      if (!entry) return;
      simVarModalIndex = index;

      const modal = document.getElementById('simvar-modal');
      const entityInput = document.getElementById('simvar-modal-entity');
      const simvarInput = document.getElementById('simvar-modal-simvar');
      const unitInput = document.getElementById('simvar-modal-unit');
      const typeSelect = document.getElementById('simvar-modal-type');
      const decimalsInput = document.getElementById('simvar-modal-decimals');

      if (entityInput) entityInput.value = entry.entity_id || '';
      if (simvarInput) simvarInput.value = entry.simvar || '';
      if (unitInput) unitInput.value = entry.unit || '';
      if (typeSelect) typeSelect.value = normalizeTypeValue(entry.type);
      if (decimalsInput) {
        const decimals = parseDecimalInput(entry.decimals);
        decimalsInput.value = Number.isFinite(decimals) ? String(decimals) : '';
      }

      updateSimVarModalSummary(entry.entity_id, entry.simvar);
      updateSimVarModalCurrentValue();

      if (modal) {
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
      }
    }

    function closeSimVarModal() {
      const modal = document.getElementById('simvar-modal');
      if (modal) {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }
      simVarModalIndex = null;
    }

    function saveSimVarModal() {
      if (simVarModalIndex === null) return;
      syncSimVarListFromEditor();
      const entry = simVarList[simVarModalIndex] || {};
      const entityInput = document.getElementById('simvar-modal-entity');
      const simvarInput = document.getElementById('simvar-modal-simvar');
      const unitInput = document.getElementById('simvar-modal-unit');
      const typeSelect = document.getElementById('simvar-modal-type');
      const decimalsInput = document.getElementById('simvar-modal-decimals');

      entry.entity_id = entityInput ? entityInput.value.trim() : entry.entity_id;
      entry.simvar = simvarInput ? simvarInput.value.trim() : entry.simvar;
      entry.unit = unitInput ? unitInput.value.trim() : entry.unit;
      entry.type = typeSelect ? normalizeTypeValue(typeSelect.value) : entry.type;

      const decimals = decimalsInput ? parseDecimalInput(decimalsInput.value) : null;
      if (decimals === null) {
        delete entry.decimals;
      } else {
        entry.decimals = decimals;
      }

      simVarList[simVarModalIndex] = entry;
      commitSimVarList({ syncFromEditor: false });
      scheduleSimVarAutosave();
      updateSimVarModalSummary(entry.entity_id, entry.simvar);
      updateSimVarModalCurrentValue();
    }

    function bindSimVarModalControls() {
      const modal = document.getElementById('simvar-modal');
      const entityInput = document.getElementById('simvar-modal-entity');
      const simvarInput = document.getElementById('simvar-modal-simvar');
      const closeBtn = document.getElementById('simvar-modal-close');
      const cancelBtn = document.getElementById('simvar-modal-cancel');
      const saveBtn = document.getElementById('simvar-modal-save');
      const decimalsInput = document.getElementById('simvar-modal-decimals');

      const refreshModal = () => {
        const entity = entityInput ? entityInput.value.trim() : '';
        const simvar = simvarInput ? simvarInput.value.trim() : '';
        updateSimVarModalSummary(entity, simvar);
        updateSimVarModalCurrentValue();
      };

      if (entityInput) entityInput.addEventListener('input', refreshModal);
      if (simvarInput) simvarInput.addEventListener('input', refreshModal);
      if (decimalsInput) decimalsInput.addEventListener('input', updateSimVarModalCurrentValue);

      if (closeBtn) closeBtn.addEventListener('click', closeSimVarModal);
      if (cancelBtn) cancelBtn.addEventListener('click', closeSimVarModal);
      if (saveBtn) saveBtn.addEventListener('click', saveSimVarModal);

      if (modal) {
        modal.addEventListener('click', (event) => {
          if (event.target === modal) {
            closeSimVarModal();
          }
        });
      }

      document.addEventListener('keydown', (event) => {
        const isOpen = modal && modal.classList.contains('open');
        if (isOpen && event.key === 'Escape') {
          closeSimVarModal();
        }
      });
    }

    function collectSimVarListFromEditor() {
      const rows = Array.from(document.querySelectorAll('#simvar-editor-list .simvar-grid'));
      return rows.map((row, index) => {
        const entry = {};
        row.querySelectorAll('[data-field]').forEach((field) => {
          const key = field.dataset.field;
          entry[key] = field.value;
        });
        const existing = simVarList[index] || {};
        if (Object.prototype.hasOwnProperty.call(existing, 'unit')) {
          entry.unit = existing.unit;
        }
        if (Object.prototype.hasOwnProperty.call(existing, 'type')) {
          entry.type = existing.type;
        }
        if (existing.decimals !== undefined) entry.decimals = existing.decimals;
        if (existing.name && !entry.name) {
          entry.name = existing.name;
        }
        return entry;
      });
    }

    function syncSimVarListFromEditor() {
      const list = collectSimVarListFromEditor();
      simVarList = Array.isArray(list) ? list : [];
    }

    function commitSimVarList(options) {
      const opts = options || {};
      if (opts.syncFromEditor !== false) {
        syncSimVarListFromEditor();
      }
      ipcRenderer.send('set-sim-var-draft-list', simVarList);
      const validList = filterValidSimVarList(simVarList);
      ipcRenderer.sendSync('set-sim-var-list', validList);
      if (opts.render !== false) {
        renderSimVarEditorList();
      }
    }

    function loadSimVarList() {
      const draft = ipcRenderer.sendSync('get-sim-var-draft-list');
      const saved = ipcRenderer.sendSync('get-sim-var-list') || [];
      if (Array.isArray(draft) && draft.length) {
        simVarList = draft;
      } else {
        simVarList = Array.isArray(saved) ? saved : [];
      }
      renderSimVarEditorList();
    }

    function addSimVarRow() {
      simVarList.push({
        name: '',
        entity_id: '',
        simvar: '',
        unit: '',
        type: 'float64'
      });
      renderSimVarEditorList();
      scheduleSimVarAutosave();
    }

    function removeSimVarRow(index) {
      simVarList.splice(index, 1);
      renderSimVarEditorList();
      scheduleSimVarAutosave();
    }

    function saveSimVarList() {
      commitSimVarList();
    }

    function resetSimVarList() {
      ipcRenderer.sendSync('set-sim-var-draft-list', []);
      const saved = ipcRenderer.sendSync('set-sim-var-list', []) || [];
      simVarList = Array.isArray(saved) ? saved : [];
      renderSimVarEditorList();
    }

    function loadSimMetricsConfig() {
      const cfg = ipcRenderer.sendSync('get-sim-metrics-config') || {};
      const inputs = document.querySelectorAll('input[data-sim-metric]');
      inputs.forEach((input) => {
        const key = input.dataset.simMetric;
        if (Object.prototype.hasOwnProperty.call(cfg, key)) {
          input.checked = !!cfg[key];
        } else {
          input.checked = true;
        }
      });
    }

    function collectSimMetricsConfig() {
      const config = {};
      const inputs = document.querySelectorAll('input[data-sim-metric]');
      inputs.forEach((input) => {
        config[input.dataset.simMetric] = !!input.checked;
      });
      return config;
    }

    function saveSimMetricsConfig() {
      ipcRenderer.send('set-sim-metrics-config', collectSimMetricsConfig());
    }

    function bindSimMetricsInputs() {
      const inputs = document.querySelectorAll('input[data-sim-metric]');
      inputs.forEach((input) => {
        input.addEventListener('change', saveSimMetricsConfig);
      });
    }

    function scheduleSimVarAutosave() {
      if (simVarAutosaveTimer) clearTimeout(simVarAutosaveTimer);
      simVarAutosaveTimer = setTimeout(() => {
        syncSimVarListFromEditor();
        // Only save draft - don't trigger bridge restart
        ipcRenderer.send('set-sim-var-draft-list', simVarList);
      }, 600);
    }

    function bindSimVarAutosave() {
      const editor = document.getElementById('simvar-editor-list');
      if (!editor) return;
      editor.addEventListener('input', scheduleSimVarAutosave);
      editor.addEventListener('change', scheduleSimVarAutosave);
    }

    function normalizeDecimalPlaces(value) {
      if (value === null || value === undefined || value === '') return null;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return null;
      const rounded = Math.floor(parsed);
      if (rounded < 0) return null;
      return Math.min(6, rounded);
    }

    function getSimVarDecimals(entityId) {
      if (!entityId) return null;
      const entry = simVarList.find((item) => item && item.entity_id === entityId);
      if (!entry) return null;
      return normalizeDecimalPlaces(entry.decimals);
    }

    function formatMetricDisplay(value, unit, decimals) {
      let text = '--';
      if (value !== undefined && value !== null) {
        if (typeof value === 'number' && Number.isFinite(value) && Number.isFinite(decimals)) {
          text = value.toFixed(decimals);
        } else {
          text = String(value);
        }
      }
      if (text === '--') return text;
      if (unit) text += ' ' + unit;
      return text;
    }

    function updateInlineValues(scope, metrics) {
      const nodes = document.querySelectorAll(`.metrics-inline-value[data-scope="${scope}"], .simvar-value[data-scope="${scope}"]`);
      if (!nodes.length) return;
      const values = new Map();
      if (Array.isArray(metrics)) {
        metrics.forEach((metric) => {
          if (!metric || !metric.entity_id) return;
          const decimals = scope === 'sim' ? getSimVarDecimals(metric.entity_id) : null;
          values.set(metric.entity_id, formatMetricDisplay(metric.value, metric.unit, decimals));
        });
      }
      nodes.forEach((node) => {
        const entity = node.dataset.entity;
        if (!entity) return;
        if (values.has(entity)) {
          node.textContent = values.get(entity);
        }
      });
    }

    function cacheSimMetrics(metrics) {
      if (!Array.isArray(metrics)) return;
      metrics.forEach((metric) => {
        if (!metric || !metric.entity_id) return;
        lastSimMetrics.set(metric.entity_id, {
          value: metric.value,
          unit: metric.unit || ''
        });
      });
    }

    function renderMetricsPreview(metrics, elementId) {
      const container = document.getElementById(elementId || 'metrics-values');
      if (!container) return;
      container.innerHTML = '';
      if (!Array.isArray(metrics) || metrics.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'metrics-value-item';
        empty.textContent = 'No data yet';
        container.appendChild(empty);
        return;
      }
      metrics.forEach((metric) => {
        const row = document.createElement('div');
        row.className = 'metrics-value-item';
        const label = document.createElement('span');
        label.className = 'metrics-value-label';
        label.textContent = metric.name || metric.entity_id || 'Metric';
        const value = document.createElement('span');
        value.textContent = formatMetricDisplay(metric.value, metric.unit);
        row.appendChild(label);
        row.appendChild(value);
        container.appendChild(row);
      });
    }

    function setupTabs() {
      const buttons = Array.from(document.querySelectorAll('.tab-button'));
      const panels = Array.from(document.querySelectorAll('.tab-content'));
      const activate = (tabId) => {
        buttons.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.tab === tabId);
        });
        panels.forEach((panel) => {
          panel.classList.toggle('active', panel.dataset.tab === tabId);
        });
      };
      buttons.forEach((btn) => {
        btn.addEventListener('click', () => activate(btn.dataset.tab));
      });
      activate('system');
    }

    // Settings beim Start laden
    window.addEventListener('DOMContentLoaded', () => {
      setupTabs();
      const autostartEnabled = ipcRenderer.sendSync('get-autostart');
      document.getElementById('autostart-checkbox').checked = autostartEnabled;

      const savedIp = ipcRenderer.sendSync('get-tab5-ip');
      document.getElementById('tab5-ip').value = savedIp;
      bindTab5IpInput();

      loadMetricsConfig();
      bindMetricsInputs();
      loadSimConfig();
      bindSimInputs();
      loadPcMetricsEnabled();
      bindPcMetricsToggle();
      loadKeyOutputEnabled();
      bindKeyOutputToggle();
      loadSimVarList();
      bindSimVarAutosave();
      bindSimVarModalControls();
      updateTab5Buttons(document.getElementById('status')?.classList.contains('connected') ? 'connected' : 'disconnected');
    });

    ipcRenderer.on('metrics-update', (event, metrics) => {
      updateInlineValues('pc', metrics);
    });

    ipcRenderer.on('sim-update', (event, metrics) => {
      cacheSimMetrics(metrics);
      updateInlineValues('sim', metrics);
      updateSimVarModalCurrentValue();
    });

    ipcRenderer.on('sim-status', (event, status) => {
      const statusEl = document.getElementById('sim-status');
      if (!statusEl) return;
      statusEl.className = `status-pill ${status}`;
      statusEl.textContent = status === 'connected' ? 'Connected' : 'Disconnected';
    });

    // Status Updates
    ipcRenderer.on('status', (event, status) => {
      const statusEl = document.getElementById('status');
      statusEl.className = `status ${status}`;
      statusEl.textContent = status === 'connected' ? 'Connected' : 'Disconnected';
      updateTab5Buttons(status);
    });

    // Log Messages
    ipcRenderer.on('log', (event, data) => {
      const logDiv = document.getElementById('log');
      const logBody = document.querySelector('.log-body');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${data.timestamp}</span>${data.message}`;
      logDiv.appendChild(entry);
      if (logBody) {
        logBody.scrollTop = logBody.scrollHeight;
      }
    });

    // Button Press Updates
    ipcRenderer.on('button-pressed', (event, data) => {
      const lastButton = document.getElementById('last-button');
      lastButton.innerHTML = `
        <div class="slot">Button ${data.slot}</div>
        <div class="name">${data.name}</div>
        <div class="key-info">Key: 0x${data.key.toString(16).toUpperCase().padStart(2, '0')} | Modifier: 0x${data.modifier.toString(16).toUpperCase().padStart(2, '0')}</div>
      `;
    });

    function connect() {
      const ip = document.getElementById('tab5-ip').value;
      ipcRenderer.send('set-tab5-ip', ip);
      ipcRenderer.send('connect');
    }

    function disconnect() {
      ipcRenderer.send('disconnect');
    }

    function updateTab5Buttons(status) {
      const connected = status === 'connected';
      const toggleBtn = document.getElementById('tab5-toggle-btn');
      if (!toggleBtn) return;
      toggleBtn.textContent = connected ? 'Disconnect' : 'Connect';
      toggleBtn.className = connected ? 'secondary btn-compact' : 'primary btn-compact';
    }

    function toggleTab5Connection() {
      const isConnected = document.getElementById('status')?.classList.contains('connected');
      if (isConnected) {
        disconnect();
      } else {
        connect();
      }
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function toggleAutostart() {
      const enabled = document.getElementById('autostart-checkbox').checked;
      ipcRenderer.send('set-autostart', enabled);
    }
  </script>
</body>
</html>
