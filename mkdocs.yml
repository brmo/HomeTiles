site_name: HomeTiles
site_description: Tile-based ESP32-P4 firmware for Home Assistant dashboards
site_url: https://galusperes.github.io/HomeTiles/
repo_url: https://github.com/GalusPeres/HomeTiles
repo_name: GalusPeres/HomeTiles

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  favicon: images/favicon.svg
  logo: images/logo.svg
  palette:
    - scheme: slate
      primary: black
      accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - Setup:
      - Flashing the Firmware: flashing.md
      - Home Assistant Setup: home-assistant-setup.md
      - Bridge Integration: bridge.md
  - Guide:
      - Web Admin Panel: web-admin.md
      - On-Device UI: device-ui.md
      - Tile Types: tiles.md
  - Help:
      - Firmware Updates: updating.md
      - FAQ & Troubleshooting: faq.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
