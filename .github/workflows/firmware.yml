# Release-Ablauf: FW_VERSION in version.txt erhoehen -> committen ->
# "git tag vX.Y.Z" -> "git push --follow-tags". Der Release-Build startet
# NUR beim Tag-Push; der Tag muss exakt FW_VERSION entsprechen (wird unten
# geprueft). Details: RELEASING.md
name: Firmware builds

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

env:
  ARDUINO_CORE_VERSION: "3.3.7"
  ARDUINO_CACHE_KEY: arduino-esp32-3.3.7-libs-v3

jobs:
  toolchain:
    name: Prepare Arduino toolchain
    runs-on: ubuntu-latest

    steps:
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Restore Arduino cache
        id: arduino-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ env.ARDUINO_CACHE_KEY }}

      - name: Install ESP32 core and Arduino libraries
        shell: bash
        run: |
          retry() {
            local max_attempts="$1"
            shift
            local attempt
            for attempt in $(seq 1 "${max_attempts}"); do
              "$@" && return 0
              echo "Command failed on attempt ${attempt}: $*"
              if [ "${attempt}" -lt "${max_attempts}" ]; then
                sleep $((attempt * 30))
              fi
            done
            return 1
          }

          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
          retry 5 arduino-cli core update-index
          retry 12 arduino-cli core install "esp32:esp32@${ARDUINO_CORE_VERSION}"
          retry 5 arduino-cli lib update-index
          retry 5 arduino-cli lib install "ArduinoJson@7.4.3"
          retry 5 arduino-cli lib install "DallasTemperature@4.0.6"
          retry 5 arduino-cli lib install "GFX Library for Arduino@1.6.5"
          retry 5 arduino-cli lib install "lvgl@9.5.0"
          retry 5 arduino-cli lib install "M5GFX@0.2.25"
          retry 5 arduino-cli lib install "M5Unified@0.2.14"
          retry 5 arduino-cli lib install "OneWire@2.3.8"
          retry 5 arduino-cli lib install "PubSubClient@2.8"
          retry 5 arduino-cli lib install "WebSockets@2.7.2"

  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: M5Stack Tab5
            profile: tab5
            key: m5stacks_tab5
            define: DEVICE_M5STACKS_TAB5
          - label: Waveshare 4B
            profile: waveshare_b4
            key: waveshare_4b
            define: DEVICE_WAVESHARE_4B
          - label: Waveshare 8 inch
            profile: waveshare_8
            key: waveshare_touch_lcd_8
            define: DEVICE_WAVESHARE_TOUCH_LCD_8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore Arduino cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ env.ARDUINO_CACHE_KEY }}

      - name: Configure Arduino CLI
        shell: bash
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
          arduino-cli core list
          arduino-cli lib list

      - name: Apply ESP-Hosted 3.3.7 TX/RX allocation fixes
        shell: bash
        run: |
          set -euo pipefail

          ar_bin="$(find "$HOME/.arduino15/packages/esp32/tools" -type f -path '*/bin/riscv32-esp-elf-ar' -print -quit)"
          test -x "$ar_bin"

          for fix_dir in esp-hosted-3.3.7-tx-fix esp-hosted-3.3.7-rx-fix; do
            for variant in esp32p4-libs esp32p4_es-libs; do
              archive="$HOME/.arduino15/packages/esp32/tools/${variant}/${ARDUINO_CORE_VERSION}/lib/libespressif__esp_hosted.a"
              test -f "$archive"

              for fixed_object in "$GITHUB_WORKSPACE/tools/${fix_dir}/${variant}"/*.obj; do
                test -f "$fixed_object"
                object_name="$(basename "$fixed_object")"

                work_dir="$(mktemp -d)"
                cp "$fixed_object" "$work_dir/$object_name"
                "$ar_bin" rs "$archive" "$work_dir/$object_name"
                (
                  cd "$work_dir"
                  rm "$object_name"
                  "$ar_bin" x "$archive" "$object_name"
                  cmp "$object_name" "$fixed_object"
                )
                rm -rf "$work_dir"
              done
            done
          done

      - name: Verify release tag matches firmware version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(node -e "const fs=require('fs'); const text=fs.readFileSync('version.txt','utf8'); const m=text.match(/FW_VERSION\s+\"([^\"]+)\"/); if(!m) process.exit(1); process.stdout.write(m[1]);")"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match FW_VERSION $version"
            exit 1
          fi

      - name: Compile firmware
        shell: bash
        run: |
          common_flags="-DLV_CONF_INCLUDE_SIMPLE -I$GITHUB_WORKSPACE -I$HOME/Arduino/libraries"
          arduino-cli compile \
            --profile "${{ matrix.profile }}" \
            --export-binaries \
            --output-dir "build/ci/${{ matrix.key }}" \
            --build-property "compiler.c.extra_flags=$common_flags" \
            --build-property "compiler.cpp.extra_flags=-DHOMETILES_CI_TARGET -D${{ matrix.define }} $common_flags"

      - name: Package firmware binaries
        shell: bash
        run: |
          node release-helper/package-ci-build.js \
            --build-dir "build/ci/${{ matrix.key }}" \
            --device-key "${{ matrix.key }}"

      - name: Archive private debug symbols
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          SYMBOLS_DEPLOY_KEY: ${{ secrets.SYMBOLS_DEPLOY_KEY }}
          SYMBOLS_REPOSITORY: GalusPeres/HomeTiles-symbols
          DEVICE_KEY: ${{ matrix.key }}
        run: |
          set -euo pipefail

          elf_path="build/ci/${DEVICE_KEY}/HomeTiles.ino.elf"
          archive_name="hometiles_${GITHUB_REF_NAME}_${DEVICE_KEY}.elf.gz"
          archive_path="${RUNNER_TEMP}/${archive_name}"
          test -f "${elf_path}"
          gzip -9 -c "${elf_path}" > "${archive_path}"

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SYMBOLS_DEPLOY_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -t ed25519 github.com > "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

          symbols_dir="${RUNNER_TEMP}/hometiles-symbols"
          git clone --depth 1 "git@github.com:${SYMBOLS_REPOSITORY}.git" "${symbols_dir}"
          cd "${symbols_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # The three matrix jobs finish independently. Retry against the
          # latest private main branch if another device pushed first.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p "${GITHUB_REF_NAME}"
            cp "${archive_path}" "${GITHUB_REF_NAME}/${archive_name}"
            git add "${GITHUB_REF_NAME}/${archive_name}"

            if git diff --cached --quiet; then
              exit 0
            fi

            git commit -m "Archive ${GITHUB_REF_NAME} ${DEVICE_KEY} symbols"
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done

          echo "Failed to archive ${archive_name} after concurrent push retries" >&2
          exit 1

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.key }}
          path: build/releases/*.bin
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: build/release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          ls -la build/release-assets
          test "$(find build/release-assets -maxdepth 1 -type f -name '*.bin' | wc -l)" -eq 6

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" build/release-assets/*.bin \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
