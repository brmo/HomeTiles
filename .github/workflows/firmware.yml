name: Firmware builds

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: M5Stack Tab5
            profile: tab5
            key: m5stacks_tab5
            define: DEVICE_M5STACKS_TAB5
          - label: Waveshare 4B
            profile: waveshare_b4
            key: waveshare_4b
            define: DEVICE_WAVESHARE_4B
          - label: Waveshare 8 inch
            profile: waveshare_8
            key: waveshare_touch_lcd_8
            define: DEVICE_WAVESHARE_TOUCH_LCD_8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESP32 core
        shell: bash
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@3.3.7"

      - name: Install Arduino libraries
        shell: bash
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "ArduinoJson@7.4.3"
          arduino-cli lib install "DallasTemperature@4.0.6"
          arduino-cli lib install "GFX Library for Arduino@1.6.5"
          arduino-cli lib install "lvgl@9.5.0"
          arduino-cli lib install "M5GFX@0.2.20"
          arduino-cli lib install "M5Unified@0.2.14"
          arduino-cli lib install "OneWire@2.3.8"
          arduino-cli lib install "PubSubClient@2.8"
          arduino-cli lib install "WebSockets@2.7.2"

      - name: Verify release tag matches firmware version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="$(node -e "const fs=require('fs'); const text=fs.readFileSync('version.txt','utf8'); const m=text.match(/FW_VERSION\s+\"([^\"]+)\"/); if(!m) process.exit(1); process.stdout.write(m[1]);")"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match FW_VERSION $version"
            exit 1
          fi

      - name: Compile firmware
        shell: bash
        run: |
          arduino-cli compile \
            --profile "${{ matrix.profile }}" \
            --export-binaries \
            --output-dir "build/ci/${{ matrix.key }}" \
            --build-property "compiler.cpp.extra_flags=-DHOMETILES_CI_TARGET -D${{ matrix.define }}"

      - name: Package firmware binaries
        shell: bash
        run: |
          node release-helper/package-ci-build.js \
            --build-dir "build/ci/${{ matrix.key }}" \
            --device-key "${{ matrix.key }}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.key }}
          path: build/releases/*.bin
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: build/release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          ls -la build/release-assets
          test "$(find build/release-assets -maxdepth 1 -type f -name '*.bin' | wc -l)" -eq 6

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated firmware build for $GITHUB_REF_NAME."
          fi
          gh release upload "$GITHUB_REF_NAME" build/release-assets/*.bin \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
